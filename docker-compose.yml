services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -lc "bundle exec rails db:prepare && bundle exec rails server -b 0.0.0.0 -p 3000"
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      RAILS_ENV: development
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
      - node_modules:/rails/node_modules
      - storage:/rails/storage

  css:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -lc "yarn install && yarn build:css --watch"
    env_file:
      - .env
    environment:
      RAILS_ENV: development
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
      - node_modules:/rails/node_modules

volumes:
  bundle:
  node_modules:
  storage:

